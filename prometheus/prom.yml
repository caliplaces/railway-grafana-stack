global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["coruscant.railway.internal:8080"]

  - job_name: "coruscant"
    scrape_interval: 15s
    static_configs:
      - targets: ["your-api-service.railway.internal:8080"]
    metrics_path: "/metrics"
